<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Chandrakant">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <title>Password-Generator</title>
</head>
<body>
  <div class="card">
    <h2 class="title">Your Password Generator</h2>
    
    <div class="output-group">
      <input type="text" id="password" value="p@ssW0rd_G#nerAt0r_9!" readonly>
      <button class="copy-btn" id="copy-btn">📋 Copy</button>
    </div>

    <div class="length-group">
      <label>Password Length</label>
      <div class="slider-container">
        <input type="number" id="length-num" min="8" max="20" value="8">
        <span id="min-val">8</span>
        <input type="range" id="length-slider" min="8" max="20" value="8">
        <span id="max-val">20</span>
      </div>
    </div>

    <div class="option-grid">
      <label class="option">
        <label class="switch">
          <input type="checkbox" checked id="punctuation">
          <span class="toggle-slider"></span>
        </label>
        Include Punctuations
      </label>
    </div>

    <button class="generate-btn" id="generate-btn">Generate Password</button>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
